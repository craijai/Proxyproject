<!DOCTYPE html>
<html>
<body>

<h1>My Browser</h1>

<input id="url" placeholder="Enter URL">
<button onclick="go()">Go</button>

<iframe id="frame" width="100%" height="600"></iframe>

<script>
function go(){
  let url = document.getElementById("url").value;
  document.getElementById("frame").src = url;
}
</script>

</body>
</html>
